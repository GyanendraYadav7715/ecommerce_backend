version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: store_mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-7539}
      MYSQL_DATABASE: store_api
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_PASSWORD:-7539}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - store_network

  api:
    build: .
    container_name: store_api
    restart: always
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:mysql://db:3306/store_api?createDatabaseIfNotExist=true&allowPublicKeyRetrieval=true&useSSL=false
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=${DB_PASSWORD:-7539}
      # Load other secrets from env, provide dummy defaults if they don't exist during run
      - JWT_SECRET=${JWT_SECRET:-dHJpcGxlc2VjcmV0ZGVmYXVsdGtleXZlcnlsb25nMTIzNDU2Nzg5MA==}
      - ACTOKEXP=${ACTOKEXP:-3600000}
      - RETOKEXP=${RETOKEXP:-864000000}
      - STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY:-sk_test_yourkey}
      - STRIPE_WEBHOOK_SECRET_KEY=${STRIPE_WEBHOOK_SECRET_KEY:-whsec_yourkey}
    networks:
      - store_network

volumes:
  db_data:

networks:
  store_network:
    driver: bridge
